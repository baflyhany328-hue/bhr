                availablePieces = [];

                                return false;
                            }
                        }
                    }
                }
                return true;
            }
            
            function placePiece(piece, row, col) {
                const shape = piece.shape;
                for(let r = 0; r < shape.length; r++) {
                    for(let c = 0; c < shape[0].length; c++) {
                        if(shape[r][c] === 1) {
                            board[row + r][col + c] = 1;
                        }
                    }
                }
                score += piece.cells;
                checkAndClearLines();
                return true;
            }
            
            function checkAndClearLines() {
                let rowsToClear = [];
                let colsToClear = [];
                for(let i = 0; i < GRID_SIZE; i++) {
                    let fullRow = true;
                    for(let j = 0; j < GRID_SIZE; j++) {
                        if(board[i][j] === 0) { fullRow = false; break; }
                    }
                    if(fullRow) rowsToClear.push(i);
                }
                for(let j = 0; j < GRID_SIZE; j++) {
                    let fullCol = true;
                    for(let i = 0; i < GRID_SIZE; i++) {
                        if(board[i][j] === 0) { fullCol = false; break; }
                    }
                    if(fullCol) colsToClear.push(j);
                }
                for(let row of rowsToClear) {
                    for(let j = 0; j < GRID_SIZE; j++) {
                        if(board[row][j] === 1) {
                            board[row][j] = 0;
                            score += 10;
                        }
                    }
                }
                for(let col of colsToClear) {
                    for(let i = 0; i < GRID_SIZE; i++) {
                        if(board[i][col] === 1) {
                            board[i][col] = 0;
                            score += 10;
                        }
                    }
                }
            }
            
            function checkGameOver() {
                for(let pieceIdx = 0; pieceIdx < availablePieces.length; pieceIdx++) {
                    const piece = availablePieces[pieceIdx];
                    const shape = piece.shape;
                    for(let i = 0; i <= GRID_SIZE - shape.length; i++) {
                        for(let j = 0; j <= GRID_SIZE - shape[0].length; j++) {
                            if(canPlacePiece(piece, i, j)) {
                                return false;
                            }
                        }
                    }
                }
                return true;
            }
            
            function renderGame() {
                const container = document.getElementById('blockGameContainer');
                if(!container) return;
                
                const boardHtml = `
                    <div class="block-game-header">
                        <div class="block-score">🎯 ${t('score')}: ${score}</div>
                        <button id="blockRestartBtn">🔄 ${t('new_game')}</button>
                    </div>
                    <div class="block-grid" id="blockGrid"></div>
                    <div class="block-pieces" id="blockPieces"></div>
                    <div id="blockGameOver" class="game-over-message" style="display: none;">${t('game_over')}</div>
                `;
                container.innerHTML = boardHtml;
                
                const gridContainer = document.getElementById('blockGrid');
                for(let i = 0; i < GRID_SIZE; i++) {
                    for(let j = 0; j < GRID_SIZE; j++) {
                        const cell = document.createElement('div');
                        cell.className = `block-cell ${board[i][j] === 1 ? 'placed' : ''}`;
                        if(board[i][j] === 1) cell.classList.add('placed');
                        cell.onclick = () => tryPlacePiece(i, j);
                        gridContainer.appendChild(cell);
                    }
                }
                
                const piecesContainer = document.getElementById('blockPieces');
                availablePieces.forEach((piece, idx) => {
                    const pieceDiv = document.createElement('div');
                    pieceDiv.className = `block-piece ${idx === selectedPieceIndex ? 'selected' : ''}`;
                    const shape = piece.shape;
                    const shapeHtml = `<div class="piece-shape" style="grid-template-columns: repeat(${shape[0].length}, 1fr);">${shape.map(row => row.map(cell => `<div class="piece-cell" style="${cell === 1 ? '' : 'opacity:0; background: transparent;'}"></div>`).join('')).join('')}</div>`;
                    pieceDiv.innerHTML = shapeHtml;
                    pieceDiv.onclick = (e) => { e.stopPropagation(); selectedPieceIndex = idx; renderGame(); };
                    piecesContainer.appendChild(pieceDiv);
                });
                
                if(checkGameOver()) document.getElementById('blockGameOver').style.display = 'block';
                const restartBtn = document.getElementById('blockRestartBtn');
                if(restartBtn) restartBtn.onclick = initGame;
            }
            
            function tryPlacePiece(row, col) {
                if(selectedPieceIndex >= availablePieces.length) return;
                const piece = availablePieces[selectedPieceIndex];
                if(canPlacePiece(piece, row, col)) {
                    placePiece(piece, row, col);
                    availablePieces.splice(selectedPieceIndex, 1);
                    selectedPieceIndex = 0;
                    if(availablePieces.length === 0) generateNewPieces();
                    renderGame();
                } else {
                    const cell = document.querySelector(`.block-grid .block-cell:nth-child(${row * GRID_SIZE + col + 1})`);
                    if(cell) { cell.classList.add('ghost'); setTimeout(() => cell.classList.remove('ghost'), 300); }
                }
            }
            
            const content = `<div class="modal-title"><i class="fas fa-cubes"></i> ${t('title_blockblast')}</div><div class="block-blast-container" id="blockGameContainer"></div>`;
            openModal(content);
            initGame();
        }

            function appendNumber(number) { if (shouldResetScreen) { currentInput = number; shouldResetScreen = false; } else { currentInput = currentInput === '0' ? number : currentInput + number; } updateDisplay(); }
            function appendDecimal() { if (shouldResetScreen) { currentInput = '0.'; shouldResetScreen = false; updateDisplay(); return; } if (!currentInput.includes('.')) { currentInput += '.'; updateDisplay(); } }
            function clearDisplay() { currentInput = '0'; previousInput = ''; operation = null; updateDisplay(); }

            function percentage() { currentInput = (parseFloat(currentInput) / 100).toString(); updateDisplay(); }
            function calculate() { let result; const prev = parseFloat(previousInput); const curr = parseFloat(currentInput); if (isNaN(prev) || isNaN(curr)) return; switch (operation) { case 'add': result = prev + curr; break; case 'subtract': result = prev - curr; break; case 'multiply': result = prev * curr; break; case 'divide': result = curr === 0 ? 'Error' : prev / curr; break; default: return; } currentInput = result === 'Error' ? 'Error' : result.toString(); operation = null; previousInput = ''; shouldResetScreen = true; updateDisplay(); }

        }

        function loadTicTacToe() {
            currentService = 'tictactoe';
            let board = Array(9).fill(null);
            let gameActive = true;
            let currentPlayer = 'X';
            let aiMode = true;
            
            const content = `<div class="modal-title"><i class="fas fa-times-circle"></i> ${t('title_tictactoe')}</div><div class="game-container"><div class="game-status" id="gameStatus">${t('player_turn')} (X)</div><div class="game-board" id="gameBoard"></div><div class="flex-row" style="justify-content: center; margin-top: 20px;"><button id="restartGameBtn" class="reset-game-btn">🔄 ${t('restart')}</button><button id="toggleModeBtn" class="reset-game-btn" style="background: rgba(139,92,246,0.3);">🤖 AI Mode</button></div></div>`;
            openModal(content);
            
            const gameBoard = document.getElementById('gameBoard');
            const gameStatus = document.getElementById('gameStatus');
            const restartBtn = document.getElementById('restartGameBtn');
            const toggleModeBtn = document.getElementById('toggleModeBtn');
            
            function renderBoard() {
                gameBoard.innerHTML = '';
                for(let i = 0; i < 9; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'game-cell';
                    if(!gameActive || board[i]) cell.classList.add('disabled');
                    cell.textContent = board[i] || '';
                    if(board[i] === 'X') cell.style.color = '#8b5cf6';
                    if(board[i] === 'O') cell.style.color = '#ec4899';
                    cell.onclick = () => handleMove(i);
                    gameBoard.appendChild(cell);
                }
            }
            
            function checkWinner() {
                const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for(let pattern of winPatterns) {
                    const [a,b,c] = pattern;
                    if(board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
                }
                return board.every(cell => cell !== null) ? 'draw' : null;
            }
            
            function updateStatus(winner) {
                if(winner === 'X') gameStatus.innerHTML = t('you_win');
                else if(winner === 'O') gameStatus.innerHTML = t('ai_win');
                else if(winner === 'draw') gameStatus.innerHTML = t('draw');
                else gameStatus.innerHTML = `${currentPlayer === 'X' ? t('player_turn') : t('ai_turn')} (${currentPlayer})`;
            }
            
            function aiMove() {
                if(!gameActive || currentPlayer !== 'O' || !aiMode) return;
                setTimeout(() => {
                    let available = board.map((cell, idx) => cell === null ? idx : null).filter(v => v !== null);
                    if(available.length === 0) return;
                    let move = available[Math.floor(Math.random() * available.length)];
                    board[move] = 'O';
                    const winner = checkWinner();
                    if(winner) { gameActive = false; updateStatus(winner); renderBoard(); return; }
                    currentPlayer = 'X';
                    updateStatus(null);
                    renderBoard();
                }, 300);
            }
            
            function handleMove(index) {
                if(!gameActive || board[index] !== null) return;
                if(aiMode && currentPlayer !== 'X') return;
                board[index] = 'X';
                const winner = checkWinner();
                if(winner) { gameActive = false; updateStatus(winner); renderBoard(); return; }
                currentPlayer = 'O';
                updateStatus(null);
                renderBoard();
                if(aiMode && gameActive) aiMove();
            }
            
            function restartGame() { board = Array(9).fill(null); gameActive = true; currentPlayer = 'X'; renderBoard(); updateStatus(null); }
            function toggleMode() { aiMode = !aiMode; toggleModeBtn.textContent = aiMode ? "🤖 AI Mode" : "👥 2 Players"; restartGame(); }
            renderBoard();
            restartBtn.onclick = restartGame;
            toggleModeBtn.onclick = toggleMode;
        }

        function loadMemoryMatch() {
            currentService = 'memory';
            const icons = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
            let cards = [], flipped = [], matched = [], lockBoard = false, moves = 0, matches = 0;
            
            function shuffleArray(arr) { for(let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
            function initGame() { let doubled = shuffleArray([...icons, ...icons]); cards = doubled; flipped = []; matched = []; lockBoard = false; moves = 0; matches = 0; updateStats(); renderBoard(); }
            function updateStats() { const statsDiv = document.getElementById('memoryStats'); if(statsDiv) statsDiv.innerHTML = `<span>🎯 ${t('moves')}: ${moves}</span><span>✅ ${t('matches')}: ${matches}/${icons.length}</span>`; }
            function renderBoard() { const board = document.getElementById('memoryBoard'); if(!board) return; board.innerHTML = ''; cards.forEach((card, idx) => { const cardDiv = document.createElement('div'); cardDiv.className = `memory-card ${flipped.includes(idx) ? 'flipped' : ''} ${matched.includes(idx) ? 'matched' : ''}`; cardDiv.textContent = (flipped.includes(idx) || matched.includes(idx)) ? card : '?'; cardDiv.onclick = () => flipCard(idx); board.appendChild(cardDiv); }); }
            function flipCard(idx) { if(lockBoard || flipped.includes(idx) || matched.includes(idx)) return; flipped.push(idx); renderBoard(); if(flipped.length === 2) { moves++; updateStats(); lockBoard = true; setTimeout(() => { const [card1, card2] = flipped; if(cards[card1] === cards[card2]) { matched.push(card1, card2); matches++; updateStats(); } flipped = []; lockBoard = false; renderBoard(); if(matches === icons.length) setTimeout(() => alert('🎉 ' + (currentLang === 'en' ? 'Congratulations! You won!' : 'مبروك! لقد فزت!')), 100); }, 800); } }
            
            const content = `<div class="modal-title"><i class="fas fa-brain"></i> ${t('title_memory')}</div><div class="game-container"><div class="memory-stats" id="memoryStats"></div><div class="memory-board" id="memoryBoard"></div><button id="restartMemoryBtn" style="margin-top: 20px;">🔄 ${t('new_game')}</button></div>`;
            openModal(content);
            const restartBtn = document.getElementById('restartMemoryBtn');
            restartBtn.onclick = initGame;
            initGame();
        }

        // ========== Services Grid ==========
        const services = [
            { id: "chat", name: "💬 BHR Chat", icon: "🤖", desc: "Smart × Dumb Chat | AI Images" },
            { id: "mood", name: "🧠 BHR Mood", icon: "😊", desc: "AI-Powered Mood Analyzer" },
            { id: "horoscope", name: "🔮 BHR Horoscope", icon: "🌟", desc: "Zodiac Sign + Predictions" },
            { id: "problem", name: "🧩 BHR Solver", icon: "💡", desc: "Analyze Problems, Get Solutions" },
            { id: "age", name: "📅 BHR Age", icon: "⏱️", desc: "Detailed Age + AI Analysis" },
            { id: "image", name: "🎨 BHR Image", icon: "🖼️", desc: "AI Image Generator" },
            { id: "barcode", name: "📱 BHR QR", icon: "📱", desc: "Custom QR Code Generator" },
            { id: "password", name: "🔐 BHR Pass", icon: "🔑", desc: "Strong Password Generator" },
            { id: "calculator", name: "🧮 BHR Calc", icon: "🧮", desc: "Professional Calculator" },
            { id: "text2pdf", name: "📄 Text to PDF", icon: "📄", desc: "Text + .txt file → PDF" },
            { id: "pdf2text", name: "📖 PDF to Text", icon: "📖", desc: "Extract text from PDF" },
            { id: "image2pdf", name: "🖼️ Image to PDF", icon: "🖼️", desc: "Convert images to PDF" },
            { id: "tictactoe", name: "❌⭕ Tic Tac Toe", icon: "🎮", desc: "X O Game vs AI" },
            { id: "memory", name: "🧠 Memory Match", icon: "🎴", desc: "Card matching game" },
            { id: "colorquiz", name: "🎨 Color Quiz", icon: "🎨", desc: "Discover personality from color" },
            { id: "health", name: "🥗 Health Plan", icon: "🥗", desc: "Personalized diet & nutrition" },
            { id: "phone", name: "📱 Phone Generator", icon: "📱", desc: "Random phone numbers by country" },
            { id: "blockblast", name: "🧩 Block Blast", icon: "🧩", desc: "Addictive puzzle game" }
        ];

        const servicesGrid = document.getElementById('servicesGrid');
        servicesGrid.innerHTML = services.map(s => `
            <div class="service-card" data-id="${s.id}">
                <div class="service-icon">${s.icon}</div>
                <h2>${s.name}</h2>
                <p>${s.desc}</p>
            </div>
        `).join('');

        document.querySelectorAll('.service-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = card.dataset.id;
                currentService = id;
                if(id === 'chat') loadChat();
                else if(id === 'mood') loadMood();
                else if(id === 'horoscope') loadHoroscope();
                else if(id === 'problem') loadProblemSolver();
                else if(id === 'age') loadAgeCalculator();
                else if(id === 'image') loadImageGenerator();
                else if(id === 'barcode') loadBarcode();
                else if(id === 'password') loadPasswordGenerator();
                else if(id === 'calculator') loadCalculator();
                else if(id === 'text2pdf') loadText2Pdf();
                else if(id === 'pdf2text') loadPdf2Text();
                else if(id === 'image2pdf') loadImage2Pdf();
                else if(id === 'tictactoe') loadTicTacToe();
                else if(id === 'memory') loadMemoryMatch();
                else if(id === 'colorquiz') loadColorQuiz();
                else if(id === 'health') loadHealthAnalyzer();
                else if(id === 'phone') loadPhoneGenerator();
                else if(id === 'blockblast') loadBlockBlast();
            });
        });

        // ========== Language Toggle ==========
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('langBtn').innerHTML = currentLang === 'en' ? '🇸🇦 العربية' : '🇬🇧 English';
            
            const descEn = [
                "Smart × Dumb Chat | AI Images", "AI-Powered Mood Analyzer", "Zodiac Sign + Predictions",
                "Analyze Problems, Get Solutions", "Detailed Age + AI Analysis", "AI Image Generator",
                "Custom QR Code Generator", "Strong Password Generator", "Professional Calculator",
                "Text + .txt file → PDF", "Extract text from PDF", "Convert images to PDF",
                "X O Game vs AI", "Card matching game", "Discover personality from favorite color",
                "Personalized diet & nutrition plan", "Random phone numbers by country", "Addictive block puzzle game"
            ];
            const descAr = [
                "شات عبقري × غبي | صور بالذكاء الاصطناعي", "محلل الحالة المزاجية بالذكاء الاصطناعي",
                "اعرف برجك + توقعات يومية", "حلل مشكلتك واحصل على حلول ذكية",
                "حساب العمر بالتفصيل + تحليل ذكي", "مولد الصور بالذكاء الاصطناعي",
                "مولد QR Code مخصص", "مولد كلمات مرور قوية", "آلة حاسبة احترافية",
                "نص + ملف .txt → PDF", "استخراج النص من PDF", "تحويل الصور إلى PDF",
                "لعبة إكس أو ضد الذكاء الاصطناعي", "لعبة تطابق الذاكرة",
                "اكتشف شخصيتك من لونك المفضل", "نظام غذائي مخصص حسب حالتك الصحية",
                "مولد أرقام هواتف عشوائية حسب الدولة", "لعبة بلوك بلاست - ألغاز إدمانية"
            ];
            const cards = document.querySelectorAll('.service-card');
            cards.forEach((card, idx) => { const p = card.querySelector('p'); if(p) p.textContent = currentLang === 'en' ? descEn[idx] : descAr[idx]; });
            
            if(modal.classList.contains('active') && currentService) {
                if(currentService === 'chat') loadChat();
                else if(currentService === 'mood') loadMood();
                else if(currentService === 'horoscope') loadHoroscope();
                else if(currentService === 'problem') loadProblemSolver();
                else if(currentService === 'age') loadAgeCalculator();
                else if(currentService === 'image') loadImageGenerator();
                else if(currentService === 'barcode') loadBarcode();
                else if(currentService === 'password') loadPasswordGenerator();
                else if(currentService === 'calculator') loadCalculator();
                else if(currentService === 'text2pdf') loadText2Pdf();
                else if(currentService === 'pdf2text') loadPdf2Text();
                else if(currentService === 'image2pdf') loadImage2Pdf();
                else if(currentService === 'tictactoe') loadTicTacToe();
                else if(currentService === 'memory') loadMemoryMatch();
                else if(currentService === 'colorquiz') loadColorQuiz();
                else if(currentService === 'health') loadHealthAnalyzer();
                else if(currentService === 'phone') loadPhoneGenerator();
                else if(currentService === 'blockblast') loadBlockBlast();
            }
        }

        let isDark = true;
        const themeBtn = document.getElementById('themeBtn');
        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            if(isDark) { document.body.classList.remove('light-mode'); themeBtn.innerHTML = '<i class="fas fa-moon"></i> Dark'; }
            else { document.body.classList.add('light-mode'); themeBtn.innerHTML = '<i class="fas fa-sun"></i> Light'; }
        });

        document.getElementById('langBtn').addEventListener('click', toggleLang);

        for(let i = 0; i < 50; i++) {
            const circle = document.createElement('div');
            circle.className = 'circle';
            const size = Math.random() * 100 + 30;
            circle.style.width = size + 'px';
            circle.style.height = size + 'px';
            circle.style.left = Math.random() * 100 + '%';
            circle.style.animationDelay = Math.random() * 20 + 's';
            circle.style.animationDuration = Math.random() * 15 + 10 + 's';
            document.getElementById('bgAnimation').appendChild(circle);
        }

        document.getElementById('enterBtn').addEventListener('click', () => {
            document.getElementById('welcomeScreen').classList.add('hide');
            setTimeout(() => {
                document.getElementById('welcomeScreen').style.display = 'none';
                document.getElementById('appContainer').classList.add('show');
            }, 500);
        });
    </script>
</body>
